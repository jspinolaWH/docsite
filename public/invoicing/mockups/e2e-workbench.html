<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WasteHero — Flow workbench (provisioning to FINVOICE)</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#155dfc;--blue-light:#e8efff;--blue-hover:#1250d4;
  --text:#171717;--muted:#737373;--faint:#a3a3a3;
  --border:#eef0f2;--border-mid:#e2e5e9;--bg:#f6f7f9;--white:#fff;--surface:#f4f5f7;
  --green:#16a34a;--green-bg:#dcfce7;--amber:#d97706;--amber-bg:#fef3c7;
  --red:#dc2626;--red-bg:#fee2e2;--purple:#7c3aed;--purple-bg:#ede9fe;
  --pink:#db2777;--pink-bg:#fce7f3;--cyan:#0891b2;--cyan-bg:#cffafe;
  --ink:#0f172a;--radius:10px;--radius-sm:6px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 30px rgba(15,23,42,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.mono{font-family:'JetBrains Mono',monospace}
a{color:var(--blue);text-decoration:none}
input,select{font-family:'Poppins',sans-serif}
.top{background:var(--white);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;justify-content:space-between;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
.brand{display:flex;align-items:center;gap:10px}
.brand .dot{width:11px;height:11px;border-radius:3px;background:var(--blue)}
.brand h1{font-size:14.5px;font-weight:600}.brand .sub{font-size:11px;color:var(--muted)}
.top-r{display:flex;gap:10px;align-items:center}
.issues-pill{display:flex;align-items:center;gap:8px;padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:500;cursor:pointer}
.issues-pill .led{width:9px;height:9px;border-radius:999px}
.issues-pill.ok{background:var(--green-bg);color:var(--green)} .issues-pill.ok .led{background:var(--green)}
.issues-pill.warn{background:var(--amber-bg);color:var(--amber)} .issues-pill.warn .led{background:var(--amber)}
.issues-pill.err{background:var(--red-bg);color:var(--red)} .issues-pill.err .led{background:var(--red)}
.shell{display:flex;min-height:calc(100vh - 50px)}
.side{width:236px;background:var(--white);border-right:1px solid var(--border);padding:14px 12px;flex-shrink:0}
.nav-group{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:12px 10px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius);cursor:pointer;font-size:13.5px;color:var(--text);margin-bottom:2px}
.nav-item:hover{background:var(--surface)}.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:500}
.nav-item .ic{width:18px;text-align:center;opacity:.8}
.nav-item .ct{margin-left:auto;font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--faint)}
.nav-item .badge{margin-left:auto;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.nav-item .badge.err{background:var(--red);color:#fff}.nav-item .badge.warn{background:var(--amber);color:#fff}
.main{flex:1;padding:24px 30px 60px;max-width:1100px}
.page-head{margin-bottom:16px}
.eyebrow{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--blue);font-weight:600;font-family:'JetBrains Mono',monospace}
.page-title{font-size:23px;font-weight:600;margin:5px 0}.page-sub{font-size:13px;color:var(--muted);max-width:740px}
.warns{margin-bottom:16px;display:flex;flex-direction:column;gap:7px}
.warn-line{display:flex;gap:10px;align-items:flex-start;padding:10px 13px;border-radius:var(--radius);font-size:12.5px;line-height:1.45}
.warn-line.err{background:var(--red-bg);color:#991b1b;border-left:3px solid var(--red)}
.warn-line.warn{background:var(--amber-bg);color:#92400e;border-left:3px solid var(--amber)}
.warn-line.info{background:var(--blue-light);color:#1e40af;border-left:3px solid var(--blue)}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.card.flag{border-color:#fca5a5}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);gap:10px;flex-wrap:wrap}
.card-title{font-size:13px;font-weight:600}.card-body{padding:15px 16px}
.pds{display:flex;gap:6px;flex-wrap:wrap}
.pd{font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:2px 8px;border-radius:4px;background:var(--blue-light);color:var(--blue);font-weight:500}.pd:hover{background:var(--blue);color:#fff}
table{width:100%;border-collapse:collapse}thead{background:var(--surface)}
th{padding:9px 13px;text-align:left;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:500;white-space:nowrap}
td{padding:11px 13px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}
.right{text-align:right}.num-cell{font-family:'JetBrains Mono',monospace;text-align:right}
.chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500;white-space:nowrap}
.chip.blue{background:var(--blue-light);color:var(--blue)}.chip.green{background:var(--green-bg);color:var(--green)}
.chip.amber{background:var(--amber-bg);color:var(--amber)}.chip.purple{background:var(--purple-bg);color:var(--purple)}
.chip.cyan{background:var(--cyan-bg);color:var(--cyan)}.chip.pink{background:var(--pink-bg);color:var(--pink)}
.chip.gray{background:var(--surface);color:var(--muted)}.chip.red{background:var(--red-bg);color:var(--red)}
.chip.wild{background:#f5f5f5;color:var(--faint);border:1px dashed var(--border-mid);font-family:'JetBrains Mono',monospace}
.btn{height:36px;padding:0 14px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-hover)}
.btn-ghost{background:var(--white);border:1px solid var(--border-mid);color:var(--text)}.btn-ghost:hover{background:var(--surface)}
.btn-sm{height:30px;padding:0 11px;font-size:12px;border-radius:var(--radius-sm)}
.btn-danger{background:var(--white);border:1px solid #fca5a5;color:var(--red)}.btn-danger:hover{background:var(--red-bg)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.tog{position:relative;width:38px;height:22px;border-radius:999px;background:var(--border-mid);cursor:pointer;transition:.15s;flex-shrink:0}
.tog.on{background:var(--blue)}.tog::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:999px;background:#fff;transition:.15s}.tog.on::after{transform:translateX(16px)}
.in{padding:7px 10px;border:1px solid var(--border-mid);border-radius:var(--radius-sm);font-size:13px;outline:none;width:100%}
.in:focus{border-color:var(--blue)}.in.mono{font-family:'JetBrains Mono',monospace}.in.w-sm{width:90px}.in.w-xs{width:74px}
.field-inline{display:flex;align-items:center;gap:9px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.kv{display:grid;grid-template-columns:130px 1fr;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.kv:last-child{border-bottom:none}.kv .k{color:var(--muted);font-size:12px}.kv .v{font-weight:500}
.prop{border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--white);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.prop.flag{border-color:#fca5a5}
.prop .ph{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.prop .addr{font-weight:600;font-size:14px}.prop .meta{font-size:12px;color:var(--muted);margin-top:2px}
.prop .pb{padding:13px 15px}
.ctr{border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:10px}
.ctr.pending{background:#fffdf6;border-color:#fde68a}.ctr.onroute{background:#f6f9ff;border-color:#bfdbfe}
.ctr-head{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.attr-row{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0}
.eff{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-radius:var(--radius);padding:8px 11px;margin-top:9px;font-size:12.5px}
.eff.bad{background:var(--red-bg)}.eff .big{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px}
.strike{text-decoration:line-through;color:var(--faint)}
.trace{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:6px}
.trace-step{padding:9px 12px;border-top:1px solid var(--border);font-size:12.5px;display:flex;justify-content:space-between;gap:10px;align-items:center}
.trace-step:first-child{border-top:none}.trace-step.win{background:#f0fdf4}.trace-step.over{background:var(--pink-bg)}
.score-pill{font-family:'JetBrains Mono',monospace;font-size:10.5px;padding:1px 7px;border-radius:999px;background:var(--surface);color:var(--muted)}
.score-pill.top{background:var(--green-bg);color:var(--green);font-weight:600}
.lifebar{display:flex;align-items:center;gap:6px;font-size:11px;margin-top:4px}
.lifebar .seg{padding:2px 8px;border-radius:999px;background:var(--surface);color:var(--faint)}
.lifebar .seg.on{background:var(--blue-light);color:var(--blue);font-weight:600}
.lifebar .seg.done{background:var(--green-bg);color:var(--green);font-weight:600}
.lifebar .ar{color:var(--faint)}
.split{display:grid;grid-template-columns:1fr 372px;gap:20px;align-items:start}
.phone{background:var(--ink);border-radius:26px;padding:11px;box-shadow:var(--shadow-lg);border:1px solid #0b1220}
.phone-screen{background:#0b1426;border-radius:16px;min-height:560px;padding:15px;color:#e2e8f0;display:flex;flex-direction:column}
.phone-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.phone-top .app{font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.phone-top .who{font-size:11px;color:rgba(255,255,255,.55)}
.dstop{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:11px;padding:11px;margin-bottom:8px;cursor:pointer}
.dstop:hover{background:rgba(255,255,255,.09)}.dstop.done{opacity:.5}.dstop.prov{border-color:rgba(96,165,250,.45)}
.dstop .a{font-size:13px;font-weight:600;color:#fff}.dstop .b{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.dstop .row{display:flex;justify-content:space-between;align-items:center;margin-top:7px}
.d-badge{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600}
.d-pending{background:rgba(217,119,6,.2);color:#fbbf24}.d-done{background:rgba(22,163,74,.2);color:#4ade80}
.d-prov{background:rgba(59,130,246,.2);color:#93c5fd}.d-bad{background:rgba(220,38,38,.25);color:#fca5a5}
.phone-back{background:none;border:none;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;margin-bottom:10px;padding:0}
.d-section{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:700;margin:13px 0 7px}
.d-kv{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.d-kv .dk{color:rgba(255,255,255,.45)}
.d-svc{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border:1px solid rgba(255,255,255,.1);border-radius:9px;margin-bottom:6px;cursor:pointer}
.d-svc.sel{border-color:#4ade80;background:rgba(74,222,128,.08)}.d-svc.locked{opacity:.6;cursor:default}
.d-svc input{margin-top:2px}.d-svc .sn{font-size:12px;font-weight:600;color:#fff}.d-svc .sm{font-size:10.5px;color:rgba(255,255,255,.45)}
.d-price{background:rgba(255,255,255,.06);border-radius:11px;padding:11px;margin:11px 0}
.d-price .pl{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:rgba(255,255,255,.7)}
.d-price .pl.tot{border-top:1px solid rgba(255,255,255,.12);margin-top:6px;padding-top:7px;font-weight:700;color:#fff;font-size:13px}
.d-info{background:rgba(59,130,246,.12);border:1px solid rgba(96,165,250,.35);border-radius:10px;padding:11px;font-size:11.5px;color:#bfdbfe;margin:11px 0}
.d-warn{background:rgba(220,38,38,.14);border:1px solid rgba(248,113,113,.4);border-radius:10px;padding:11px;font-size:11.5px;color:#fca5a5;margin:11px 0}
.d-complete{width:100%;height:42px;border:none;border-radius:11px;background:#22c55e;color:#062b13;font-weight:700;font-size:13px;cursor:pointer;margin-top:auto}
.d-complete.prov{background:#3b82f6;color:#fff}
.d-complete:disabled{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4);cursor:not-allowed}
.d-done-box{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:11px;padding:13px;text-align:center;margin-top:auto}
.d-done-box .t{font-weight:700;color:#4ade80;font-size:14px}.d-done-box .s{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px}
.tk{display:flex;align-items:center;gap:11px;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;background:var(--white)}
.tk.pending{border-color:#fde68a}.tk.onroute{border-color:#bfdbfe}
.tk .info{flex:1;min-width:0}.tk .ta{font-size:13px;font-weight:500}.tk .tb{font-size:11.5px;color:var(--muted)}
.route-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;background:var(--white)}
.route-item.done{opacity:.85}.route-item.bad{border-color:#fca5a5}.route-item.prov{border-color:#bfdbfe;background:#f6f9ff}
.route-item .n{width:26px;height:26px;border-radius:999px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--muted);flex-shrink:0}
.route-item.done .n{background:var(--green-bg);color:var(--green)}.route-item.prov .n{background:var(--blue-light);color:var(--blue)}
.route-item .info{flex:1;min-width:0}.route-item .ra{font-size:13px;font-weight:500}.route-item .rb{font-size:11.5px;color:var(--muted)}
.xml{background:#0f1322;color:#cdd6f4;padding:17px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;overflow-x:auto;white-space:pre;border-radius:var(--radius);max-height:560px;overflow-y:auto}
.xml .t{color:#f5c2e7}.xml .a{color:#f9e2af}.xml .s{color:#a6e3a1}
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty .ico{font-size:30px;margin-bottom:8px;opacity:.5}.empty .t{font-weight:600;color:var(--text)}.empty .s{font-size:12.5px;margin-top:4px}
.section-label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:16px 0 9px}
.muted{color:var(--muted)}
.add-form{background:var(--surface);border:1px dashed var(--border-mid);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.add-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.fld label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.drawer{position:fixed;top:0;right:0;height:100vh;width:380px;background:var(--white);box-shadow:var(--shadow-lg);transform:translateX(100%);transition:.22s;z-index:40;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.drawer-head h3{font-size:15px;font-weight:600}.drawer-body{padding:14px 18px;overflow-y:auto;flex:1}
.di{display:flex;gap:10px;padding:11px 12px;border-radius:var(--radius);margin-bottom:9px;cursor:pointer;font-size:12.5px;line-height:1.45}
.di.err{background:var(--red-bg)}.di.warn{background:var(--amber-bg)}.di:hover{outline:1px solid var(--border-mid)}
.di .lvl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:4px;height:fit-content;flex-shrink:0}
.di.err .lvl{background:var(--red);color:#fff}.di.warn .lvl{background:var(--amber);color:#fff}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:35;opacity:0;pointer-events:none;transition:.2s}
.overlay.open{opacity:1;pointer-events:auto}
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--ink);color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:13px;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);transition:.2s}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:900px){.shell{flex-direction:column}.side{width:100%;display:flex;flex-wrap:wrap;gap:4px;border-right:none;border-bottom:1px solid var(--border)}.nav-group{width:100%}.split,.grid2{grid-template-columns:1fr}.drawer{width:100%}}
</style>
</head>
<body>
<div class="top">
  <div class="brand"><span class="dot"></span><div><h1>WasteHero — Flow workbench</h1><div class="sub">Provision a container by ticket, activate it on a route, then bill it. Edit anywhere, watch it flow.</div></div></div>
  <div class="top-r"><button class="btn btn-ghost btn-sm" onclick="resetSim()">↺ Reset</button><div id="issuesPill" onclick="toggleDrawer()"></div></div>
</div>
<div class="shell"><nav class="side" id="side"></nav><main class="main" id="main"></main></div>
<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer"><div class="drawer-head"><h3>Issues</h3><button class="btn btn-ghost btn-sm" onclick="toggleDrawer()">Close</button></div><div class="drawer-body" id="drawerBody"></div></div>
<div class="toast-wrap" id="toasts"></div>

// ===================== engine (operates on a container)
function propOf(ct){return S.properties.find(p=>p.id===ct.propertyId);}
function custOf(ct){const p=propOf(ct);return S.customers.find(c=>c.id===p.customerId);}
function ctxC(ct){const c=custOf(ct);return{customerType:c.type,zone:c.zone,serviceResp:c.serviceResp,rdCode:ct.rdCode,customer:c};}
function scoreRows(ct){
  const ctx=ctxC(ct);const attrs=['customerType','zone','serviceResp','rdCode'];
  return S.priceRows.filter(r=>r.productId===ct.productId).map(r=>{
    let compatible=true,score=0;
    attrs.forEach(a=>{if(r[a]==='Any'){}else if(String(r[a])===String(ctx[a])){score++;}else{compatible=false;}});
    return{row:r,compatible,score};
  });
}
function winnerRow(ct){const c=scoreRows(ct).filter(s=>s.compatible);c.sort((a,b)=>b.score-a.score);return c[0];}
function effectiveUnit(ct){
  const w=winnerRow(ct);const overridden=ct.agreement.overrideOn;
  if(overridden){const ok=ct.agreement.overridePrice>0;return{listPrice:w?w.row.price:null,unit:ok?ct.agreement.overridePrice:null,overridden:true,winner:w,badOverride:!ok};}
  if(!w)return{listPrice:null,unit:null,overridden:false,winner:null,noMatch:true};
  return{listPrice:w.row.price,unit:w.row.price,overridden:false,winner:w};
}
function resolve(ct,chosen){
  const ctx=ctxC(ct);const product=S.products.find(p=>p.id===ct.productId);const eff=effectiveUnit(ct);
  const publicLaw=ctx.serviceResp!=='Market-based';const prop=propOf(ct);
  if(eff.unit==null)return{ctx,product,eff,lines:[],applied:[],noteSvc:[],net:0,vat:0,gross:0,publicLaw,ct,prop,error:eff.noMatch?'no-match':'bad-override'};
  const baseNet=eff.unit*ct.qty;
  const auto=SERVICES.filter(s=>s.automatic&&(s.appliesTo==='any'||s.appliesTo===product.id));
  const chos=SERVICES.filter(s=>(chosen||[]).includes(s.id)&&!s.automatic);
  const applied=[...auto,...chos];
  const lines=[{name:product.name,qty:ct.qty,unitLabel:product.unit,unit:eff.unit,net:baseNet,account:product.account,primary:true}];
  applied.filter(s=>s.affectsPrice).forEach(s=>lines.push({name:s.name,qty:1,unitLabel:'each',unit:s.price,net:s.price,account:'30009',primary:false}));
  const noteSvc=applied.filter(s=>!s.affectsPrice);
  const net=lines.reduce((t,l)=>t+l.net,0);const vat=net*VAT_RATE/100;
  return{ctx,product,eff,lines,applied,noteSvc,net,vat,gross:net+vat,publicLaw,ct,prop};
}
function invoices(){
  const map={};S.events.forEach(e=>{(map[e.custId]=map[e.custId]||[]).push(e);});
  return Object.keys(map).map((cid,i)=>{
    const evs=map[cid];const lines=[];
    evs.forEach(e=>e.snap.lines.forEach(l=>lines.push(Object.assign({},l,{costCentre:e.snap.ct.costCentre,date:e.date,vatRate:VAT_RATE}))));
    const net=lines.reduce((t,l)=>t+l.net,0);const vat=net*VAT_RATE/100;const c=S.customers.find(x=>x.id===cid);
    return{number:'1260001'+(40+i),custId:cid,custName:c.name,einvoice:!!c.einvoiceAddr,held:!c.einvoiceAddr,einvoiceAddr:c.einvoiceAddr,events:evs,lines,net,vat,gross:net+vat};
  });
}

// ===================== validation
function computeIssues(){
  const out=[];const codes={};
  S.products.forEach(p=>{codes[p.code]=(codes[p.code]||0)+1;});
  S.products.forEach(p=>{
    if(codes[p.code]>1)out.push({lvl:'err',page:'products',msg:'Duplicate product code "'+p.code+'". Codes must be unique.'});
    if(!p.account)out.push({lvl:'warn',page:'products',msg:p.name+' has no accounting account, invoice lines will miss AR data (PD-289).'});
    if(!S.priceRows.filter(r=>r.productId===p.id).length)out.push({lvl:'err',page:'prices',msg:p.name+' has no price list rows, it cannot be priced anywhere it is used.'});
  });
  S.containers.forEach(ct=>{
    const eff=effectiveUnit(ct);const prop=propOf(ct);const c=custOf(ct);
    if(eff.noMatch)out.push({lvl:'err',page:'properties',msg:'No price row matches '+prop.address+' ('+c.type+' / '+c.zone+' / '+c.serviceResp+' / '+ct.rdCode+'). Add a matching or wildcard row.'});
    if(eff.badOverride)out.push({lvl:'err',page:'properties',msg:'Agreement override is on for '+prop.address+' but the override price is not set.'});
    if(!ct.costCentre)out.push({lvl:'warn',page:'properties',msg:prop.address+' container has no cost centre (PD-296).'});
    if(ct.agreement.status!=='active')out.push({lvl:'warn',page:'properties',msg:'Container at '+prop.address+' ('+S.products.find(p=>p.id===ct.productId).name+') is '+(ct.agreement.status==='onroute'?'on a route, not yet activated':'pending')+'. It cannot be billed until its Add container ticket is completed.'});
  });
  invoices().forEach(v=>{if(!v.einvoice)out.push({lvl:'err',page:'invoices',msg:'Invoice '+v.number+' ('+v.custName+') has no valid e-invoice address. Pre-send checks fail (PD-271).'});});
  return out;
}
function issuesFor(page){return computeIssues().filter(i=>i.page===page);}

  let h=head('The output contract','FINVOICE 3.0 XML','The invoice as structured XML, not a PDF. Only invoices that pass pre-send can be generated. A held invoice is not exportable until its e-invoice address is fixed on the Invoices page.');
  const inv=invoices();const ready=inv.filter(v=>!v.held);const held=inv.filter(v=>v.held);
  if(!inv.length)return h+emptyCard('📄','No invoice to export','Create events and an invoice first.','route','Open the route');
  if(held.length)h+='<div class="warns"><div class="warn-line err"><span>⛔</span><span>'+held.length+' invoice'+(held.length>1?'s are':' is')+' held by pre-send checks ('+held.map(v=>v.custName).join(', ')+') and cannot be generated. Fix the e-invoice address on the Invoices page.</span></div></div>';
  if(!ready.length)return h+'<div class="card"><div class="empty"><div class="ico">⛔</div><div class="t">Nothing can be generated</div><div class="s">Every invoice is held by pre-send checks. Fix the e-invoice addresses to release them.</div><div style="margin-top:14px"><button class="btn btn-primary" onclick="go(\'invoices\')">Go to Invoices</button></div></div></div>';
  h+='<div class="pds" style="margin-bottom:12px">'+pd('PD-310','FINVOICE data')+pd('PD-289','AR data')+'</div>';
  if(!ready.find(v=>v.custId===S.xmlInvoice))S.xmlInvoice=ready[0].custId;
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">'+ready.map(v=>{const on=S.xmlInvoice===v.custId;return '<button class="btn '+(on?'btn-primary':'btn-ghost')+' btn-sm" onclick="S.xmlInvoice=\''+v.custId+'\';render()">'+v.number+' · '+v.custName+'</button>';}).join('')+'</div>';
  const v=ready.find(x=>x.custId===S.xmlInvoice)||ready[0];
  h+='<div class="card"><div class="card-head"><div class="card-title">'+v.number+' · '+v.custName+'</div><span class="chip green">released · INV01</span></div><div class="xml">'+finvoice(v)+'</div></div>';
  return h;
}
function fixEinvoice(cid){
  const inp=document.getElementById('ein-'+cid);const val=inp?inp.value.trim():'';
  if(!val){toast('Enter an e-invoice address to release the invoice');return;}
  const c=S.customers.find(x=>x.id===cid);c.einvoiceAddr=val;
  toast('E-invoice address saved. '+c.name+' invoice released, pre-send now passes.');render();
}
function finvoice(v){
  const T=t=>'<span class="t">'+t+'</span>';let rows='';
  v.lines.forEach(l=>{rows+='\n  '+T('&lt;InvoiceRow&gt;')
    +'\n    '+T('&lt;ArticleName&gt;')+esc(l.name)+T('&lt;/ArticleName&gt;')
    +'\n    '+T('&lt;DeliveredQuantity ')+'<span class="a">QuantityUnitCode</span>=<span class="s">"'+(l.unitLabel==='per ton'?'TNE':'kpl')+'"</span>'+T('&gt;')+(l.unitLabel==='per ton'?l.qty.toFixed(2):l.qty)+T('&lt;/DeliveredQuantity&gt;')
    +'\n    '+T('&lt;RowVatRatePercent&gt;')+l.vatRate.toFixed(2)+T('&lt;/RowVatRatePercent&gt;')
    +'\n    '+T('&lt;AccountDimensionText&gt;')+(l.account||'')+T('&lt;/AccountDimensionText&gt;')
    +'\n    '+T('&lt;DimensionText&gt;')+(l.costCentre||'')+T('&lt;/DimensionText&gt;')
    +'\n    '+T('&lt;RowAmount ')+'<span class="a">Currency</span>=<span class="s">"EUR"</span>'+T('&gt;')+money(l.net*1.255).replace('.',',')+T('&lt;/RowAmount&gt;')
    +'\n  '+T('&lt;/InvoiceRow&gt;');});
  return T('&lt;Finvoice ')+'<span class="a">Version</span>=<span class="s">"3.0"</span>'+T('&gt;')
    +'\n  '+T('&lt;SellerPartyDetails&gt;')+'\n    '+T('&lt;SellerOrganisationName&gt;')+'Päijät-Hämeen Jätehuolto Oy'+T('&lt;/SellerOrganisationName&gt;')+'\n  '+T('&lt;/SellerPartyDetails&gt;')
    +'\n  '+T('&lt;BuyerPartyDetails&gt;')+'\n    '+T('&lt;BuyerOrganisationName&gt;')+esc(v.custName)+T('&lt;/BuyerOrganisationName&gt;')+'\n  '+T('&lt;/BuyerPartyDetails&gt;')
    +'\n  '+T('&lt;InvoiceDetails&gt;')
    +'\n    '+T('&lt;InvoiceNumber&gt;')+v.number+T('&lt;/InvoiceNumber&gt;')
    +'\n    '+T('&lt;InvoiceDate ')+'<span class="a">Format</span>=<span class="s">"CCYYMMDD"</span>'+T('&gt;')+'20260616'+T('&lt;/InvoiceDate&gt;')
    +'\n    '+T('&lt;InvoiceTotalVatExcludedAmount ')+'<span class="a">Currency</span>=<span class="s">"EUR"</span>'+T('&gt;')+money(v.net).replace('.',',')+T('&lt;/InvoiceTotalVatExcludedAmount&gt;')
    +'\n    '+T('&lt;InvoiceTotalVatAmount ')+'<span class="a">Currency</span>=<span class="s">"EUR"</span>'+T('&gt;')+money(v.vat).replace('.',',')+T('&lt;/InvoiceTotalVatAmount&gt;')
    +'\n    '+T('&lt;InvoiceTotalVatIncludedAmount ')+'<span class="a">Currency</span>=<span class="s">"EUR"</span>'+T('&gt;')+money(v.gross).replace('.',',')+T('&lt;/InvoiceTotalVatIncludedAmount&gt;')
    +'\n  '+T('&lt;/InvoiceDetails&gt;')+rows+'\n'+T('&lt;/Finvoice&gt;');
}

// ===================== ui helpers
function head(eyebrow,title,sub){return '<div class="page-head"><div class="eyebrow">'+eyebrow+'</div><div class="page-title">'+title+'</div><div class="page-sub">'+sub+'</div></div>';}
function fld(label,inner){return '<div class="fld"><label>'+label+'</label>'+inner+'</div>';}
function emptyCard(ico,t,s,page,btn){return '<div class="card"><div class="empty"><div class="ico">'+ico+'</div><div class="t">'+t+'</div><div class="s">'+s+'</div><div style="margin-top:14px"><button class="btn btn-primary" onclick="go(\''+page+'\')">'+btn+'</button></div></div></div>';}
function resetSim(){S=freshState();render();toast('Simulation reset');}
S=freshState();render();
</script>
